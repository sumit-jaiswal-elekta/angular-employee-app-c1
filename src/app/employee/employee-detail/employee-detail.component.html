<section class="card">
  <div class="card-content">
    @if (employee(); as emp) {
      <div class="card-title">Name: {{ fullName() }}</div>
      <p>
        Email: <strong>{{ emp.email }}</strong>
      </p>
      <p>
        Hours Worked:
        <strong>{{ emp.hoursWorked }}</strong>
      </p>
      <p>
        Hourly Wage:
        <strong>{{ emp.hourlyWage | currency }}</strong>
      </p>
    } @else {
      <p>Loading employee details...</p>
    }
    <hr />
    <a routerLink="/employees">Back to list</a>
  </div>
</section>
